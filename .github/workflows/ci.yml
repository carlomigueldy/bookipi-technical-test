name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_CACHE_DIR: .turbo

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
      - name: Format check
        run: pnpm format:check
      - name: Lint
        run: pnpm lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
      - name: Typecheck
        run: pnpm typecheck

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
      - name: Unit tests
        run: pnpm test

  build:
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
      - name: Build
        run: pnpm build
      - name: Assert build artifacts exist
        run: |
          set -euo pipefail
          for f in apps/api/dist/main.js apps/worker/dist/main.js packages/shared/dist/index.js; do
            test -s "$f" || { echo "::error::missing or empty build artifact: $f"; exit 1; }
          done
          node -e "require('./packages/shared/dist/index.js')"

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Dependency audit (PRD §10)
        # High/critical advisories fail the build. Registry outages are ignored so an
        # unrelated infra blip cannot block an unrelated PR (anti-flakiness, not a
        # loophole for real findings). Unfixable transitive advisories must be handled
        # via an explicit, expiring entry in `pnpm-workspace.yaml` under
        # `auditConfig.ignoreGhsas` (format: GHSA id + package + reason + review-by
        # date + owner) — never by deleting this step. pnpm 11 no longer reads the
        # legacy `pnpm` field in package.json for this setting.
        run: pnpm audit --audit-level high --ignore-registry-errors

  integration:
    needs: [typecheck, unit]
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: flash
          POSTGRES_PASSWORD: flash
          POSTGRES_DB: flash
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U flash -d flash"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      REDIS_URL: redis://localhost:6379
      DATABASE_URL: postgresql://flash:flash@localhost:5432/flash
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
      - name: Integration tests
        run: pnpm test:integration

  compose-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose file
        run: docker compose -f infra/docker-compose.yml config -q

  k6-smoke:
    needs: [build]
    runs-on: ubuntu-latest
    if: false
    steps:
      - name: k6 smoke placeholder
        run: echo "k6 smoke lands in Phase 5"
