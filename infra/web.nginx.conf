# SPA static hosting for @flash/web. Serves the Vite build output and falls back
# to index.html for any path that isn't a real file, so client-side routing (if ever
# added) and hard-refreshes on deep links both work.

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri /index.html;
  }

  # Fingerprinted build assets are safe to cache aggressively.
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
